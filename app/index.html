<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FrameX — 工作台</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 侧边栏 -->
    <aside class="sidebar">
        <a href="#" class="sidebar-logo">
            <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
                <rect x="2" y="2" width="28" height="28" rx="8" stroke="url(#sLogo)" stroke-width="2.5"/>
                <path d="M12 10L22 16L12 22V10Z" fill="url(#sLogo)"/>
                <defs><linearGradient id="sLogo" x1="0" y1="0" x2="32" y2="32"><stop stop-color="#a855f7"/><stop offset="1" stop-color="#06b6d4"/></linearGradient></defs>
            </svg>
            <span>FrameX</span>
        </a>
        <nav class="sidebar-nav">
            <a href="index.html" class="nav-item active">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="3" y="3" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="3" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="3" y="11" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="11" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/></svg>
                <span>工作台</span>
            </a>
            <a href="translate-v4.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="2" y="4" width="16" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M7 9H13M7 12H11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                <span>视频译制</span>
            </a>
            <a href="livestream.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5"/><circle cx="10" cy="10" r="3" stroke="currentColor" stroke-width="1.5"/><circle cx="4" cy="5" r="2" fill="#ef4444"/></svg>
                <span>直播剪辑</span>
            </a>
            <a href="generate.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 2L12 8H18L13 12L15 18L10 14L5 18L7 12L2 8H8L10 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
                <span>AI 生成</span>
            </a>
            <div class="nav-divider"></div>
            <a href="result.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M10 6V10L13 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <span>任务记录</span>
            </a>
        </nav>
        <div class="sidebar-bottom">
            <div class="user-card">
                <div class="avatar">U</div>
                <div class="user-info">
                    <span class="user-name">用户</span>
                    <span class="user-plan">专业版</span>
                </div>
            </div>
        </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content home-main">
        <!-- 欢迎区域 -->
        <section class="home-hero">
            <h1 class="home-title">你好，欢迎使用 FrameX</h1>
            <p class="home-subtitle">选择一个场景开始，或直接在下方输入你的需求</p>
        </section>

        <!-- 场景技能 -->
        <section class="home-skills">
            <span class="home-skills-label">场景技能</span>
            <div class="skills-grid">
                <a href="translate-v4.html" class="skill-card">
                    <div class="skill-icon skill-icon--green">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M4 10L8 3L12 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 8H11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M10 17L14 10L18 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M11 15H17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                    </div>
                    <div class="skill-body">
                        <h4>短视频出海</h4>
                        <p>TikTok / Reels / Shorts 一键多语种发布</p>
                    </div>
                    <span class="skill-arrow"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 4L10 8L6 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
                </a>
                <a href="livestream.html" class="skill-card">
                    <div class="skill-icon skill-icon--orange">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5"/><circle cx="10" cy="10" r="3" stroke="currentColor" stroke-width="1.5"/><circle cx="4" cy="5" r="2" fill="currentColor"/></svg>
                    </div>
                    <div class="skill-body">
                        <h4>在线直播精彩剪辑</h4>
                        <p>直播回放智能识别高光片段，一键剪辑</p>
                    </div>
                    <span class="skill-arrow"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 4L10 8L6 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
                </a>
                <a href="generate.html" class="skill-card">
                    <div class="skill-icon skill-icon--cyan">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 2L12 8H18L13 12L15 18L10 14L5 18L7 12L2 8H8L10 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
                    </div>
                    <div class="skill-body">
                        <h4>生成视频</h4>
                        <p>文案 / 图片一键生成高质量视频内容</p>
                    </div>
                    <span class="skill-arrow"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 4L10 8L6 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
                </a>
            </div>
        </section>

        <!-- 底部输入栏 -->
        <section class="home-input-section">
            <div class="home-input-wrap">
                <div class="home-input">
                    <input type="text" id="smartInput" placeholder="描述你想要处理的视频任务..." autocomplete="off">
                    <button class="home-upload-btn" id="uploadTrigger" title="上传">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 3V9M8 3L11 6M8 3L5 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 10V12.5C3 13.05 3.45 13.5 4 13.5H12C12.55 13.5 13 13.05 13 12.5V10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                        <span>上传</span>
                    </button>
                    <button class="home-send-btn" id="sendBtn">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8L13 3L8 13L7 9L3 8Z" fill="currentColor"/></svg>
                    </button>
                </div>
                <div class="home-quick-tags">
                    <button class="home-tag" onclick="document.getElementById('smartInput').value='帮我翻译这个视频的字幕'; document.getElementById('sendBtn').click();">✦ 一键翻译</button>
                    <button class="home-tag" onclick="document.getElementById('smartInput').value='克隆配音到英语'; document.getElementById('sendBtn').click();">🎙 克隆配音</button>
                    <button class="home-tag" onclick="document.getElementById('smartInput').value='擦除视频中的字幕'; document.getElementById('sendBtn').click();">◇ 擦除字幕</button>
                    <button class="home-tag" onclick="document.getElementById('smartInput').value='多语种发布到TikTok'; document.getElementById('sendBtn').click();">⊕ 多语种发布</button>
                </div>
                <input type="file" id="fileInput" accept="video/*" hidden>
                <!-- 拖拽上传遮罩 -->
                <div class="drop-overlay" id="dropOverlay">
                    <div class="drop-content">
                        <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><path d="M24 8V28M24 8L32 16M24 8L16 16" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M8 32V38C8 40.2091 9.79086 42 12 42H36C38.2091 42 40 40.2091 40 38V32" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
                        <span>拖入视频文件</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
