<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 生成视频 — FrameX</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
    /* ==============================================
       AI 生成 — Landing + 左右分栏工作区
       ============================================== */

    /* ===== Landing 状态 ===== */
    .gen-landing {
        flex: 1;
        overflow-y: auto;
        padding: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 0;
    }
    .gen-landing::-webkit-scrollbar { width: 5px; }
    .gen-landing::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
    .gen-landing-scroll {
        max-width: 720px;
        width: 100%;
        text-align: center;
    }

    /* Hero */
    .gen-landing-hero {
        padding: 0 0 32px;
        position: relative;
    }
    .gen-landing-hero h1 {
        font-size: 2.2rem;
        font-weight: 800;
        line-height: 1.3;
        margin-bottom: 12px;
    }
    .gen-landing-hero p {
        font-size: 1rem;
        color: #64748b;
        max-width: 520px;
        margin: 0 auto 32px;
    }
    /* Orb */
    .gen-hero-orb {
        position: relative;
        width: 80px; height: 80px;
        margin: 0 auto 28px;
    }
    .gen-hero-orb-core {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%,-50%);
        width: 56px; height: 56px;
        border-radius: 50%;
        background: linear-gradient(135deg, #a855f7, #6366f1, #06b6d4);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 40px rgba(168,85,247,0.4), 0 0 80px rgba(99,102,241,0.15);
    }
    .gen-hero-orb-ring {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%,-50%);
        width: 80px; height: 80px;
        border-radius: 50%;
        border: 2px solid rgba(168,85,247,0.15);
        animation: genOrbPulse 3s ease-in-out infinite;
    }
    @keyframes genOrbPulse {
        0%, 100% { transform: translate(-50%,-50%) scale(1); opacity: 0.5; }
        50% { transform: translate(-50%,-50%) scale(1.4); opacity: 0; }
    }

    /* Primary input area */
    .gen-primary-input {
        max-width: 600px;
        margin: 0 auto 28px;
    }
    .gen-input-box {
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 18px;
        transition: all 0.3s;
        overflow: hidden;
    }
    .gen-input-box:focus-within {
        border-color: rgba(168,85,247,0.35);
        box-shadow: 0 0 0 4px rgba(168,85,247,0.06), 0 0 40px rgba(168,85,247,0.05);
    }
    .gen-input-textarea {
        width: 100%;
        min-height: 100px;
        max-height: 200px;
        padding: 16px 18px 8px;
        background: transparent;
        border: none;
        color: #e2e8f0;
        font-size: 0.92rem;
        font-family: inherit;
        outline: none;
        resize: none;
        line-height: 1.7;
    }
    .gen-input-textarea::placeholder { color: #475569; }
    .gen-input-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 14px 10px;
    }
    .gen-input-left {
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .gen-char-count {
        font-size: 0.7rem;
        color: #475569;
        font-family: 'JetBrains Mono', monospace;
    }
    .gen-submit-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 9px 24px;
        font-size: 0.85rem;
        font-weight: 700;
        color: #fff;
        background: linear-gradient(135deg, #a855f7, #6366f1);
        border: none;
        border-radius: 12px;
        cursor: pointer;
        font-family: inherit;
        box-shadow: 0 0 24px rgba(168,85,247,0.25);
        transition: all 0.2s;
        position: relative;
        overflow: hidden;
    }
    .gen-submit-btn:hover { transform: translateY(-1px); box-shadow: 0 0 40px rgba(168,85,247,0.35); }
    .gen-submit-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
    .gen-submit-btn::before {
        content: '';
        position: absolute; top: -50%; left: -50%;
        width: 200%; height: 200%;
        background: conic-gradient(from 0deg, transparent, rgba(255,255,255,0.1), transparent 30%);
        animation: shimmer 3s linear infinite;
    }

    /* Inspiration chips */
    .gen-inspo-wrap {
        margin-bottom: 20px;
    }
    .gen-inspo-label {
        font-size: 0.72rem;
        font-weight: 600;
        color: #475569;
        margin-bottom: 10px;
    }
    .gen-inspo-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
    }
    .gen-inspo-chip {
        padding: 7px 16px;
        font-size: 0.78rem;
        font-weight: 500;
        color: #94a3b8;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 100px;
        cursor: pointer;
        transition: all 0.25s;
        display: flex;
        align-items: center;
        gap: 6px;
        font-family: inherit;
    }
    .gen-inspo-chip:hover {
        color: #e2e8f0;
        border-color: rgba(168,85,247,0.35);
        background: rgba(168,85,247,0.06);
        transform: translateY(-2px);
    }

    /* Capabilities row */
    .gen-caps {
        display: flex;
        gap: 20px;
        justify-content: center;
        margin-top: 24px;
    }
    .gen-cap {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 0.72rem;
        color: #475569;
    }
    .gen-cap-dot {
        width: 4px; height: 4px;
        border-radius: 50%;
        background: rgba(168,85,247,0.4);
    }

    /* ===== 工作区：左右分栏 ===== */
    .gen-workspace {
        display: none;
        flex: 1;
        min-height: 0;
        overflow: hidden;
    }
    .gen-workspace.active {
        display: flex;
    }

    /* Left: Canvas / Preview */
    .gen-left {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
        position: relative;
        overflow: hidden;
    }

    /* Canvas area with video/storyboard */
    .gen-canvas-wrap {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        padding: 16px;
        min-height: 0;
    }
    .gen-canvas-container {
        position: relative;
        width: 100%;
        max-width: 960px;
        aspect-ratio: 16/9;
        background: #0a0a16;
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid rgba(255,255,255,0.06);
        transition: border-color 0.3s;
    }

    /* Left phases */
    .gen-left-phase {
        position: absolute;
        inset: 0;
        display: none;
        border-radius: inherit;
        overflow: hidden;
    }
    .gen-left-phase.active { display: flex; }

    /* Storyboard grid in canvas */
    .gen-sb-view {
        flex-direction: column;
        background: #0a0a16;
    }
    .gen-sb-topbar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        flex-shrink: 0;
        border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .gen-sb-badge {
        padding: 3px 10px;
        font-size: 0.68rem;
        font-weight: 600;
        color: #a78bfa;
        background: rgba(168,85,247,0.1);
        border: 1px solid rgba(168,85,247,0.2);
        border-radius: 100px;
    }
    .gen-sb-info {
        font-size: 0.72rem;
        color: #64748b;
    }
    .gen-sb-grid {
        flex: 1;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
        padding: 12px;
        overflow-y: auto;
        min-height: 0;
    }
    .gen-sb-grid::-webkit-scrollbar { width: 4px; }
    .gen-sb-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }
    .gen-sb-card {
        position: relative;
        aspect-ratio: 16/10;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid rgba(255,255,255,0.06);
        background: linear-gradient(135deg, rgba(15,15,30,0.8), rgba(10,10,20,0.9));
        cursor: pointer;
        transition: all 0.3s;
    }
    .gen-sb-card:hover {
        border-color: rgba(168,85,247,0.3);
        transform: scale(1.02);
    }
    .gen-sb-card.selected {
        border-color: rgba(168,85,247,0.5);
        box-shadow: 0 0 20px rgba(168,85,247,0.15);
    }
    .gen-sb-card canvas { width: 100%; height: 100%; display: block; }
    .gen-sb-card-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(transparent 50%, rgba(0,0,0,0.7));
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 12px;
    }
    .gen-sb-card-num {
        position: absolute; top: 8px; left: 8px;
        width: 22px; height: 22px;
        border-radius: 7px;
        display: flex; align-items: center; justify-content: center;
        font-size: 0.65rem; font-weight: 700; color: #fff;
        background: rgba(168,85,247,0.6); backdrop-filter: blur(8px);
    }
    .gen-sb-card-dur {
        position: absolute; top: 8px; right: 8px;
        padding: 2px 7px; font-size: 0.6rem; font-weight: 500; color: #fff;
        background: rgba(0,0,0,0.55); border-radius: 5px;
        font-family: 'JetBrains Mono', monospace;
    }
    .gen-sb-card-title {
        font-size: 0.78rem; font-weight: 600; color: #fff; margin-bottom: 2px;
    }
    .gen-sb-card-desc {
        font-size: 0.62rem; color: rgba(255,255,255,0.6);
        display: -webkit-box; -webkit-line-clamp: 2;
        -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4;
    }

    /* Synthesis view */
    .gen-synth-view {
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #06060a 0%, #0a0a1a 50%, #06060a 100%);
    }
    .gen-synth-inner { text-align: center; max-width: 360px; }
    .gen-synth-orb {
        position: relative;
        width: 88px; height: 88px;
        margin: 0 auto 24px;
    }
    .gen-synth-orb .ring {
        position: absolute; top: 50%; left: 50%;
        transform: translate(-50%,-50%); border-radius: 50%;
        border: 2px solid transparent;
    }
    .gen-synth-orb .ring:nth-child(1) { width:88px;height:88px; border-top-color:#a855f7; animation: spin 1.5s linear infinite; }
    .gen-synth-orb .ring:nth-child(2) { width:66px;height:66px; border-right-color:#6366f1; animation: spin 2s linear infinite reverse; }
    .gen-synth-orb .ring:nth-child(3) { width:44px;height:44px; border-bottom-color:#06b6d4; animation: spin 1s linear infinite; }
    .gen-synth-orb .core {
        position: absolute; top:50%;left:50%; transform:translate(-50%,-50%);
        width:18px;height:18px; border-radius:50%;
        background:linear-gradient(135deg,#a855f7,#06b6d4);
        box-shadow:0 0 24px rgba(168,85,247,0.5);
    }
    @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }
    .gen-synth-text { font-size: 0.92rem; font-weight: 600; color: #e2e8f0; margin-bottom: 6px; }
    .gen-synth-sub { font-size: 0.78rem; color: #64748b; margin-bottom: 20px; }
    .gen-synth-progress {
        width: 220px; height: 3px;
        background: rgba(255,255,255,0.06); border-radius: 2px;
        overflow: hidden; margin: 0 auto 10px;
    }
    .gen-synth-bar {
        height: 100%;
        background: linear-gradient(90deg, #a855f7, #6366f1, #06b6d4);
        border-radius: 2px; width: 0%; transition: width 0.6s ease;
    }
    .gen-synth-clip-info {
        font-size: 0.72rem; color: #64748b;
        font-family: 'JetBrains Mono', monospace;
    }
    .gen-synth-dots {
        display: flex; gap: 6px; justify-content: center; margin-top: 16px;
    }
    .gen-synth-dot {
        width: 32px; height: 32px;
        border-radius: 8px;
        display: flex; align-items: center; justify-content: center;
        font-size: 0.68rem; font-weight: 700;
        color: #475569; background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.06);
        transition: all 0.3s;
    }
    .gen-synth-dot.active {
        color: #a78bfa;
        background: rgba(168,85,247,0.12);
        border-color: rgba(168,85,247,0.3);
        box-shadow: 0 0 14px rgba(168,85,247,0.15);
    }
    .gen-synth-dot.completed {
        color: #22c55e;
        background: rgba(34,197,94,0.1);
        border-color: rgba(34,197,94,0.25);
    }

    /* Player view */
    .gen-player-view {
        background: #06060a;
    }
    .gen-player-view canvas { width: 100%; height: 100%; display: block; }
    .gen-player-controls {
        position: absolute;
        bottom: 0; left: 0; right: 0;
        display: flex; align-items: center; gap: 10px;
        padding: 10px 16px;
        background: linear-gradient(transparent, rgba(0,0,0,0.7));
        z-index: 5;
    }
    .gen-timeline-overlay {
        position: absolute;
        bottom: 48px; left: 12px; right: 12px;
        display: flex; gap: 3px; height: 24px; z-index: 4;
    }
    .gen-tl-seg {
        display: flex; align-items: center; justify-content: center;
        border-radius: 5px; font-size: 0.58rem; font-weight: 600;
        border: 1px solid; transition: all 0.3s; cursor: default;
    }
    .gen-tl-seg.active {
        box-shadow: 0 0 10px rgba(168,85,247,0.2);
        transform: scaleY(1.08);
    }

    /* ===== Right: Chat Sidebar ===== */
    .gen-right {
        width: 380px;
        flex-shrink: 0;
        background: rgba(12,12,20,0.95);
        backdrop-filter: blur(20px);
        border-left: 1px solid rgba(255,255,255,0.06);
        display: flex;
        flex-direction: column;
        z-index: 50;
        overflow: hidden;
    }

    /* Chat header */
    .gen-chat-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 16px;
        flex-shrink: 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .gen-chat-header-icon {
        width: 28px; height: 28px;
        border-radius: 8px;
        background: rgba(168,85,247,0.12);
        color: #a855f7;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
    }
    .gen-chat-header h3 { font-size: 0.85rem; font-weight: 600; }
    .gen-chat-header p { font-size: 0.68rem; color: #64748b; }

    /* Chat body */
    .gen-chat-body {
        flex: 1;
        overflow-y: auto;
        padding: 16px 16px 200px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        min-height: 0;
    }
    .gen-chat-body::-webkit-scrollbar { width: 4px; }
    .gen-chat-body::-webkit-scrollbar-track { background: transparent; }
    .gen-chat-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

    /* Chat bubbles */
    .gen-bubble {
        display: flex;
        gap: 8px;
        animation: genBubbleIn 0.35s ease-out;
    }
    @keyframes genBubbleIn {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .gen-bubble--ai { align-items: flex-start; }
    .gen-bubble--user { flex-direction: row-reverse; }
    .gen-bubble-avatar {
        width: 28px; height: 28px;
        border-radius: 8px;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
        font-size: 0.75rem; font-weight: 600;
    }
    .gen-bubble--ai .gen-bubble-avatar {
        background: rgba(168,85,247,0.12); color: #a855f7;
    }
    .gen-bubble--user .gen-bubble-avatar {
        background: rgba(59,130,246,0.12); color: #60a5fa;
    }
    .gen-bubble-content {
        max-width: 85%;
        padding: 10px 14px;
        border-radius: 14px;
        font-size: 0.82rem;
        line-height: 1.6;
    }
    .gen-bubble--ai .gen-bubble-content {
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.06);
        color: #cbd5e1;
    }
    .gen-bubble--user .gen-bubble-content {
        background: rgba(168,85,247,0.12);
        border: 1px solid rgba(168,85,247,0.2);
        color: #e2e8f0;
    }

    /* Inline action cards in chat */
    .gen-chat-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 8px;
    }
    .gen-chat-action {
        padding: 6px 14px;
        font-size: 0.72rem;
        font-weight: 500;
        color: #a78bfa;
        background: rgba(168,85,247,0.06);
        border: 1px solid rgba(168,85,247,0.2);
        border-radius: 100px;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
    }
    .gen-chat-action:hover {
        background: rgba(168,85,247,0.12);
        border-color: rgba(168,85,247,0.4);
    }

    /* Confirm config button */
    .gen-confirm-config {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        margin-top: 12px;
        padding: 10px 20px;
        font-size: 0.82rem;
        font-weight: 600;
        color: #fff;
        background: linear-gradient(135deg, #a855f7, #6366f1);
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-family: inherit;
        box-shadow: 0 0 20px rgba(168,85,247,0.2);
        transition: all 0.25s;
    }
    .gen-confirm-config:hover { transform: translateY(-1px); box-shadow: 0 0 30px rgba(168,85,247,0.35); }
    .gen-confirm-config:active { transform: scale(0.98); }

    /* Clip editor in chat */
    .gen-clip-editor {
        background: rgba(255,255,255,0.02);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 12px;
        margin-top: 8px;
        overflow: hidden;
        transition: all 0.3s;
        cursor: pointer;
    }
    .gen-clip-editor:hover {
        border-color: rgba(168,85,247,0.25);
        background: rgba(255,255,255,0.03);
    }
    .gen-clip-editor.highlighted {
        border-color: rgba(168,85,247,0.5);
        background: rgba(168,85,247,0.05);
        box-shadow: 0 0 16px rgba(168,85,247,0.1);
    }
    .gen-clip-editor-head {
        display: flex; align-items: center; justify-content: space-between;
        padding: 10px 12px;
        border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .gen-clip-editor-badge {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 3px 10px; border-radius: 6px;
        font-size: 0.68rem; font-weight: 600;
    }
    .gen-clip-editor-dur {
        font-size: 0.65rem; color: #64748b;
        font-family: 'JetBrains Mono', monospace;
    }
    .gen-clip-editor-body {
        padding: 10px 12px;
        display: flex;
        gap: 10px;
    }
    /* Clip thumbnail preview inside editor */
    .gen-clip-thumb {
        width: 80px;
        height: 50px;
        border-radius: 6px;
        overflow: hidden;
        flex-shrink: 0;
        border: 1px solid rgba(255,255,255,0.06);
    }
    .gen-clip-thumb canvas {
        width: 100%; height: 100%; display: block;
    }
    .gen-clip-desc-wrap {
        flex: 1;
        min-width: 0;
    }
    .gen-clip-desc-input {
        width: 100%;
        min-height: 40px;
        padding: 8px 10px;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 8px;
        color: #e2e8f0;
        font-size: 0.78rem;
        font-family: inherit;
        outline: none;
        resize: vertical;
        line-height: 1.5;
        transition: border-color 0.2s;
    }
    .gen-clip-desc-input:focus { border-color: rgba(168,85,247,0.3); }
    .gen-clip-desc-input::placeholder { color: #475569; }

    /* Config card in chat */
    .gen-config-card {
        background: rgba(255,255,255,0.02);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 12px;
        margin-top: 8px;
        padding: 12px;
    }
    .gen-config-label {
        font-size: 0.68rem; font-weight: 600; color: #475569;
        text-transform: uppercase; letter-spacing: 0.5px;
        margin-bottom: 8px;
    }
    /* Style grid */
    .gen-style-grid {
        display: grid; grid-template-columns: repeat(3, 1fr);
        gap: 6px; margin-bottom: 10px;
    }
    .gen-style-card {
        padding: 8px 6px; text-align: center;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 8px; cursor: pointer;
        transition: all 0.2s; font-family: inherit;
    }
    .gen-style-card:hover { border-color: rgba(168,85,247,0.25); }
    .gen-style-card.active {
        border-color: rgba(168,85,247,0.5);
        background: rgba(168,85,247,0.08);
    }
    .gen-style-card .icon { font-size: 1.1rem; display: block; margin-bottom: 2px; }
    .gen-style-card .name { font-size: 0.65rem; font-weight: 600; color: #94a3b8; }
    .gen-style-card.active .name { color: #a78bfa; }

    /* Ratio chips */

    <script>
    (function() {
        // ===== Templates =====
        const templates = {
            product: '一款未来感十足的智能耳机静静地放在大理石桌面上，灯光从侧面打来，勾勒出产品的优美弧线。镜头缓缓推近，展示耳机的细节纹理和呼吸灯光效。随后场景切换到城市街头，一位年轻人戴上耳机，周围的喧嚣瞬间变成宁静的音乐世界。最后耳机 Logo 浮现在画面中央。',
            story: '清晨的小镇笼罩在薄雾中，一只流浪猫穿过空无一人的街道。它在一家面包店门口停下，透过玻璃窗看着里面忙碌的面包师。面包师注意到了窗外的猫，微笑着走出来，放下一碟温热的牛奶。猫低头喝着，尾巴轻轻摇摆。从此每个清晨，这里都有一份温暖的约定。',
            tutorial: '打开设计软件，一个空白画布出现在屏幕上。鼠标点击工具栏，选择画笔工具，开始在画布上勾勒一个简洁的 Logo 轮廓。接着切换到颜色面板，为 Logo 填充渐变色彩。添加文字排版，调整间距和大小。最后导出成品，一个专业的品牌 Logo 就完成了。',
            vlog: '飞机降落在巴厘岛，舱门打开的瞬间，热带的暖风扑面而来。画面切换到骑摩托穿越稻田的路上，两侧是无边的翠绿。在乌布的悬崖秋千上，女孩张开双臂拥抱蓝天。夕阳时分，在海边的岩石上，橘红色的天空倒映在平静的海面上。',
            promo: '从太空俯瞰地球，镜头急速下坠穿过云层，来到一座现代化的科技园区。玻璃幕墙反射着天光，年轻的工程师们在开放式办公区协作讨论。一组数据在全息屏幕上流动，展示着产品的全球用户增长曲线。最后公司的 Logo 在星空背景下亮起，slogan 缓缓浮现。'
        };

        const clipLabels = ['开场', '发展', '高潮', '结尾'];
        const clipColors = ['#a855f7', '#3b82f6', '#06b6d4', '#22c55e'];
        const clipDurations = [5, 8, 6, 5];

        let clips = [];
        let selectedStyle = 'cinematic';
        let selectedRatio = '16:9';
        let phase = 'landing'; // landing | storyboard | synth | player
        let playing = true;
        let playTime = 0;
        let totalDuration = 24;
        let animFrame = null;

        // ===== DOM =====
        const landingInput = document.getElementById('landingInput');
        const charCount = document.getElementById('charCount');
        const genLanding = document.getElementById('genLanding');
        const genWorkspace = document.getElementById('genWorkspace');
        const chatBody = document.getElementById('chatBody');
        const chatInput = document.getElementById('chatInput');

        // ===== Char count =====
        landingInput.addEventListener('input', () => {
            charCount.textContent = landingInput.value.length;
        });

        // ===== Template chips =====
        document.querySelectorAll('.gen-inspo-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                const tpl = chip.getAttribute('data-tpl');
                if (templates[tpl]) {
                    landingInput.value = templates[tpl];
                    charCount.textContent = landingInput.value.length;
                    landingInput.focus();
                }
            });
        });

        // ===== Start generation =====
        document.getElementById('startGenBtn').addEventListener('click', startCreation);

        function startCreation() {
            const text = landingInput.value.trim();
            if (!text) {
                landingInput.focus();
                landingInput.parentElement.parentElement.style.borderColor = 'rgba(239,68,68,0.5)';
                setTimeout(() => landingInput.parentElement.parentElement.style.borderColor = '', 1500);
                return;
            }

            // Parse story into clips
            const sentences = text.replace(/([。！？.!?])/g, '$1||').split('||').filter(s => s.trim());
            const chunkSize = Math.ceil(sentences.length / 4);
            clips = [];
            for (let i = 0; i < 4; i++) {
                const start = i * chunkSize;
                const chunk = sentences.slice(start, start + chunkSize).join('');
                clips.push({
                    id: i + 1,
                    title: clipLabels[i],
                    duration: clipDurations[i],
                    desc: chunk.trim() || '（AI 将自动生成画面描述）',
                    color: clipColors[i]
                });
            }
            totalDuration = clips.reduce((s, c) => s + c.duration, 0);

            // Switch to workspace
            genLanding.style.display = 'none';
            document.getElementById('mainTopbar').style.display = 'none';
            genWorkspace.classList.add('active');

            enterStoryboard(text);
        }

        // ===== Chat helpers =====
        function addBubble(type, html) {
            const bubble = document.createElement('div');
            bubble.className = `gen-bubble gen-bubble--${type}`;
            const avatarIcon = type === 'ai'
                ? '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1L8.5 4.5H12.5L9 7L10.5 10.5L7 8L3.5 10.5L5 7L1.5 4.5H5.5L7 1Z" stroke="currentColor" stroke-width="1" stroke-linejoin="round"/></svg>'
                : 'U';
            bubble.innerHTML = `
                <div class="gen-bubble-avatar">${avatarIcon}</div>
                <div class="gen-bubble-content">${html}</div>
            `;
            chatBody.appendChild(bubble);
            chatBody.scrollTop = chatBody.scrollHeight;
            return bubble;
        }

        // ===== Enter Storyboard phase =====
        function enterStoryboard(userText) {
            phase = 'storyboard';
            setLeftPhase('phaseSB');
            renderStoryboard();
            updatePipeline();

            // Build chat conversation
            chatBody.innerHTML = '';

            // User message
            addBubble('user', `<p>${userText.substring(0, 120)}${userText.length > 120 ? '...' : ''}</p>`);

            // AI response with config
            setTimeout(() => {
                const configHtml = `
                    <p>已收到你的创意！我帮你拆解为 <strong>${clips.length} 个片段</strong>，总时长约 <strong>${totalDuration}s</strong>。</p>
                    <p style="margin-top:6px;font-size:0.78rem;color:#94a3b8;">左侧可以预览分镜，点击片段可选中编辑。你也可以调整以下设置：</p>
                    <div class="gen-config-card">
                        <div class="gen-config-label">视频风格</div>
                        <div class="gen-style-grid" id="chatStyleGrid">
                            <button class="gen-style-card active" data-style="cinematic"><span class="icon">🎬</span><span class="name">电影感</span></button>
                            <button class="gen-style-card" data-style="realistic"><span class="icon">📷</span><span class="name">写实</span></button>
                            <button class="gen-style-card" data-style="anime"><span class="icon">🎨</span><span class="name">动画</span></button>
                            <button class="gen-style-card" data-style="cyber"><span class="icon">🌆</span><span class="name">赛博朋克</span></button>
                            <button class="gen-style-card" data-style="watercolor"><span class="icon">🖌️</span><span class="name">水彩画</span></button>
                            <button class="gen-style-card" data-style="3d"><span class="icon">💎</span><span class="name">3D 渲染</span></button>
                        </div>
                        <div class="gen-config-label">画面比例</div>
                        <div class="gen-ratio-row" id="chatRatioRow">
                            <button class="gen-ratio-chip active" data-ratio="16:9">16:9 横屏</button>
                            <button class="gen-ratio-chip" data-ratio="9:16">9:16 竖屏</button>
                            <button class="gen-ratio-chip" data-ratio="1:1">1:1 方形</button>
                        </div>
                        <div class="gen-config-label">画质</div>
                        <div class="gen-ratio-row">
                            <button class="gen-ratio-chip" data-q="720">720p</button>
                            <button class="gen-ratio-chip active" data-q="1080">1080p</button>
                            <button class="gen-ratio-chip" data-q="4k">4K</button>
                        </div>
                    </div>
                    <button class="gen-confirm-config" id="confirmConfigBtn">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 8L7 11L12 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        确认设置，进入分镜编辑
                    </button>
                `;
                addBubble('ai', configHtml);
                bindConfigEvents();

                // Confirm button → show clip editors
                document.getElementById('confirmConfigBtn').addEventListener('click', function() {
                    this.disabled = true;
                    this.style.opacity = '0.5';
                    this.innerHTML = '✅ 已确认';
                    showClipEditors();
                });
            }, 300);
        }

        // ===== Show clip editors (after config confirm) =====
        function showClipEditors() {
            const styleNames = { cinematic:'电影感', realistic:'写实', anime:'动画', cyber:'赛博朋克', watercolor:'水彩画', '3d':'3D 渲染' };
            addBubble('ai', `<p>👍 设置已确认！<strong>${styleNames[selectedStyle] || selectedStyle}</strong> 风格 · <strong>${selectedRatio}</strong></p><p style="margin-top:4px;font-size:0.78rem;color:#94a3b8;">以下是各片段的画面描述，<strong>点击片段可联动左侧分镜预览</strong>，也可以直接编辑：</p>`);

            setTimeout(() => {
                let clipsHtml = '';
                clips.forEach((c, i) => {
                    clipsHtml += `
                        <div class="gen-clip-editor" data-clip-idx="${i}">
                            <div class="gen-clip-editor-head">
                                <span class="gen-clip-editor-badge" style="background:${c.color}15;color:${c.color};border:1px solid ${c.color}30;">片段 ${c.id} · ${c.title}</span>
                                <span class="gen-clip-editor-dur">${c.duration}s</span>
                            </div>
                            <div class="gen-clip-editor-body">
                                <div class="gen-clip-thumb"><canvas width="160" height="100" data-thumb-idx="${i}"></canvas></div>
                                <div class="gen-clip-desc-wrap">
                                    <textarea class="gen-clip-desc-input" data-clip-idx="${i}" placeholder="描述画面...">${c.desc}</textarea>
                                </div>
                            </div>
                        </div>
                    `;
                });
                clipsHtml += `
                    <div class="gen-chat-actions" style="margin-top:10px;">
                        <button class="gen-chat-action" id="chatStartGen">✨ 确认并开始生成</button>
                        <button class="gen-chat-action" id="chatAiOptimize">🔮 AI 优化描述</button>
                    </div>
                `;
                addBubble('ai', clipsHtml);

                // Draw thumbnails in each clip editor
                clips.forEach((c, i) => {
                    const thumbCanvas = document.querySelector(`canvas[data-thumb-idx="${i}"]`);
                    if (thumbCanvas) drawClipPreview(thumbCanvas, c, i);
                });

                bindClipEditors();
            }, 300);
        }

        function bindConfigEvents() {
            // Style cards
            document.querySelectorAll('#chatStyleGrid .gen-style-card').forEach(card => {
                card.addEventListener('click', () => {
                    document.querySelectorAll('#chatStyleGrid .gen-style-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    selectedStyle = card.dataset.style;
                });
            });
            // Ratio chips
            document.querySelectorAll('#chatRatioRow .gen-ratio-chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    document.querySelectorAll('#chatRatioRow .gen-ratio-chip').forEach(c => c.classList.remove('active'));
                    chip.classList.add('active');
                    selectedRatio = chip.dataset.ratio;
                });
            });
        }

        function bindClipEditors() {
            // Text editing
            document.querySelectorAll('.gen-clip-desc-input').forEach(ta => {
                ta.addEventListener('input', e => {
                    const idx = parseInt(e.target.dataset.clipIdx);
                    if (clips[idx]) clips[idx].desc = e.target.value;
                });
            });

            // Click/hover on clip editor → highlight left storyboard card
            document.querySelectorAll('.gen-clip-editor[data-clip-idx]').forEach(editor => {
                const idx = parseInt(editor.dataset.clipIdx);

                editor.addEventListener('click', () => {
                    // Highlight this editor
                    document.querySelectorAll('.gen-clip-editor').forEach(e => e.classList.remove('highlighted'));
                    editor.classList.add('highlighted');

                    // Highlight left storyboard card
                    const sbCards = document.querySelectorAll('.gen-sb-card');
                    sbCards.forEach(c => c.classList.remove('selected'));
                    if (sbCards[idx]) {
                        sbCards[idx].classList.add('selected');
                        sbCards[idx].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }
                });

                editor.addEventListener('mouseenter', () => {
                    const sbCards = document.querySelectorAll('.gen-sb-card');
                    if (sbCards[idx]) sbCards[idx].style.boxShadow = '0 0 24px ' + clips[idx].color + '40';
                });
                editor.addEventListener('mouseleave', () => {
                    const sbCards = document.querySelectorAll('.gen-sb-card');
                    if (sbCards[idx]) sbCards[idx].style.boxShadow = '';
                });
            });

            // Also bind left storyboard cards → highlight right editor
            document.querySelectorAll('.gen-sb-card').forEach((card, idx) => {
                card.addEventListener('click', () => {
                    const editors = document.querySelectorAll('.gen-clip-editor[data-clip-idx]');
                    document.querySelectorAll('.gen-clip-editor').forEach(e => e.classList.remove('highlighted'));
                    if (editors[idx]) {
                        editors[idx].classList.add('highlighted');
                        editors[idx].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }
                });
            });

            const startBtn = document.getElementById('chatStartGen');
            if (startBtn) startBtn.addEventListener('click', startSynth);

            const optBtn = document.getElementById('chatAiOptimize');
            if (optBtn) {
                optBtn.addEventListener('click', () => {
                    optBtn.textContent = '优化中...';
                    optBtn.style.opacity = '0.5';
                    setTimeout(() => {
                        addBubble('ai', '<p>✅ 已优化所有片段描述，画面表现力更强了。确认后点击 <strong>"开始生成"</strong> 即可。</p>');
                        optBtn.textContent = '🔮 AI 优化描述';
                        optBtn.style.opacity = '';
                    }, 1200);
                });
            }
        }

        // ===== Storyboard rendering =====
        function renderStoryboard() {
            const grid = document.getElementById('sbGrid');
            grid.innerHTML = '';
            document.getElementById('sbInfo').textContent = `${clips.length} 个片段 · 总时长 ${totalDuration}s`;

            clips.forEach((clip, i) => {
                const card = document.createElement('div');
                card.className = 'gen-sb-card' + (i === 0 ? ' selected' : '');
                card.innerHTML = `
                    <canvas width="400" height="250"></canvas>
                    <div class="gen-sb-card-overlay">
                        <span class="gen-sb-card-num">${clip.id}</span>
                        <span class="gen-sb-card-dur">${clip.duration}s</span>
                        <div class="gen-sb-card-title">${clip.title}</div>
                        <div class="gen-sb-card-desc">${clip.desc}</div>
                    </div>
                `;
                grid.appendChild(card);
                drawClipPreview(card.querySelector('canvas'), clip, i);

                card.addEventListener('click', () => {
                    document.querySelectorAll('.gen-sb-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                });
            });
        }

        function drawClipPreview(canvas, clip, idx) {
            const ctx = canvas.getContext('2d');
            const w = canvas.width, h = canvas.height;
            const hue1 = (idx * 85 + 180) % 360;
            const hue2 = (hue1 + 50) % 360;
            const grd = ctx.createLinearGradient(0, 0, w, h);
            grd.addColorStop(0, `hsl(${hue1}, 35%, 12%)`);
            grd.addColorStop(0.5, `hsl(${hue2}, 30%, 16%)`);
            grd.addColorStop(1, `hsl(${(hue1+120)%360}, 25%, 10%)`);
            ctx.fillStyle = grd;
            ctx.fillRect(0, 0, w, h);

            ctx.globalAlpha = 0.15;
            for (let j = 0; j < 6; j++) {
                const x = (Math.sin(idx * 3 + j * 1.5) * 0.3 + 0.5) * w;
                const y = (Math.cos(idx * 2 + j * 2.3) * 0.3 + 0.5) * h;
                ctx.beginPath();
                ctx.arc(x, y, 30 + j * 15, 0, Math.PI * 2);
                ctx.fillStyle = clip.color;
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }

        // ===== Synthesis =====
        function startSynth() {
            phase = 'synth';
            setLeftPhase('phaseSynth');
            updatePipeline();

            // Chat feedback
            addBubble('ai', '<p>🚀 开始生成视频！正在逐个渲染片段…</p>');

            // Synth dots
            const dotsEl = document.getElementById('synthDots');
            dotsEl.innerHTML = clips.map((c, i) => `<div class="gen-synth-dot" data-idx="${i}">${c.id}</div>`).join('');

            let clipIdx = 0;
            const bar = document.getElementById('synthBar');
            const textEl = document.getElementById('synthText');
            const subEl = document.getElementById('synthSub');
            const infoEl = document.getElementById('synthClipInfo');

            function processClip() {
                if (clipIdx >= clips.length) {
                    textEl.textContent = '合成完成！';
                    subEl.textContent = '正在准备播放器...';
                    bar.style.width = '100%';
                    infoEl.textContent = `${clips.length} / ${clips.length}`;
                    document.querySelectorAll('.gen-synth-dot').forEach(d => d.classList.add('completed'));

                    setTimeout(() => enterPlayer(), 800);
                    return;
                }

                const clip = clips[clipIdx];
                textEl.textContent = `正在生成片段 ${clip.id}：${clip.title}`;
                subEl.textContent = clip.desc.substring(0, 40) + '...';
                infoEl.textContent = `${clipIdx + 1} / ${clips.length}`;

                const dots = document.querySelectorAll('.gen-synth-dot');
                dots.forEach(d => d.classList.remove('active'));
                if (clipIdx > 0) dots[clipIdx - 1].classList.add('completed');
                dots[clipIdx].classList.add('active');

                // Chat progress
                addBubble('ai', `<p style="font-size:0.78rem;">⏳ 片段 ${clip.id}「${clip.title}」渲染中…</p>`);

                const pct = ((clipIdx + 1) / clips.length) * 100;
                bar.style.width = (pct - 100/clips.length) + '%';

                const genTime = 1500 + Math.random() * 1500;
                setTimeout(() => {
                    bar.style.width = pct + '%';
                    clipIdx++;
                    setTimeout(processClip, 300);
                }, genTime);
            }
            processClip();
        }

        // ===== Player =====
        function enterPlayer() {
            phase = 'player';
            setLeftPhase('phasePlayer');
            updatePipeline();
            document.getElementById('exportBtn').style.display = '';

            // Chat done message
            const doneHtml = `
                <div class="gen-done-banner">
                    <svg width="40" height="40" viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="16" stroke="#22c55e" stroke-width="2" opacity="0.3"/><path d="M13 20L18 25L28 15" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <div class="gen-done-title">🎉 视频生成完成！</div>
                    <div class="gen-done-sub">总时长 ${totalDuration}s · ${clips.length} 个片段 · ${selectedStyle} 风格</div>
                    <div class="gen-done-actions">
                        <button class="gen-submit-btn" id="chatExportBtn" style="width:100%;">
                            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2V8M7 8L10 5M7 8L4 5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><path d="M2 9V11C2 11.5523 2.44772 12 3 12H11C11.5523 12 12 11.5523 12 11V9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
                            导出视频
                        </button>
                        <div class="gen-chat-actions">
                            <button class="gen-chat-action" id="chatRegen">🔄 重新生成</button>
                            <button class="gen-chat-action" id="chatBackEdit">✏️ 返回编辑</button>
                        </div>
                    </div>
                </div>
            `;
            addBubble('ai', doneHtml);

            document.getElementById('chatRegen')?.addEventListener('click', () => {
                if (animFrame) cancelAnimationFrame(animFrame);
                startSynth();
            });
            document.getElementById('chatBackEdit')?.addEventListener('click', () => {
                if (animFrame) cancelAnimationFrame(animFrame);
                enterStoryboard(landingInput.value);
            });

            initPlayer();
        }

        function initPlayer() {
            const canvas = document.getElementById('playerCanvas');
            const rect = canvas.parentElement.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;

            const durEl = document.getElementById('ctrlDur');
            const m = Math.floor(totalDuration / 60);
            const s = totalDuration % 60;
            durEl.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

            playTime = 0;
            playing = true;
            document.getElementById('ctrlPlay').classList.add('playing');
            renderTimelineOverlay();

            function tick() {
                if (playing) {
                    playTime += 1/60;
                    if (playTime >= totalDuration) playTime = 0;
                }
                drawPlayerFrame(playTime);
                updatePlayerUI();
                animFrame = requestAnimationFrame(tick);
            }
            tick();
        }

        function drawPlayerFrame(t) {
            const canvas = document.getElementById('playerCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            const w = canvas.width / dpr;
            const h = canvas.height / dpr;
            ctx.save(); ctx.scale(dpr, dpr);
            ctx.clearRect(0, 0, w, h);

            let elapsed = 0;
            let currentClip = clips[0];
            for (const c of clips) {
                if (t < elapsed + c.duration) { currentClip = c; break; }
                elapsed += c.duration;
            }
            const clipT = t - elapsed;
            const clipPct = clipT / currentClip.duration;
            const idx = clips.indexOf(currentClip);
            const hue1 = (idx * 85 + 180 + t * 3) % 360;
            const hue2 = (hue1 + 50) % 360;
            const grd = ctx.createLinearGradient(0, 0, w, h);
            grd.addColorStop(0, `hsl(${hue1}, 40%, 12%)`);
            grd.addColorStop(0.5, `hsl(${hue2}, 35%, 16%)`);
            grd.addColorStop(1, `hsl(${(hue1+120)%360}, 30%, 10%)`);
            ctx.fillStyle = grd;
            ctx.fillRect(0, 0, w, h);

            ctx.globalAlpha = 0.25;
            for (let i = 0; i < 12; i++) {
                const px = (Math.sin(t * 0.2 + i * 2.1) * 0.4 + 0.5) * w;
                const py = (Math.cos(t * 0.15 + i * 1.8) * 0.4 + 0.5) * h;
                ctx.beginPath();
                ctx.arc(px, py, 2 + Math.sin(t * 0.5 + i) * 1.5, 0, Math.PI * 2);
                ctx.fillStyle = currentClip.color;
                ctx.fill();
            }

            ctx.globalAlpha = 0.06;
            ctx.beginPath();
            ctx.arc(w/2 + Math.sin(t*0.3)*60, h/2 + Math.cos(t*0.2)*40, 150 + Math.sin(t*0.4)*30, 0, Math.PI*2);
            ctx.fillStyle = currentClip.color;
            ctx.fill();

            ctx.globalAlpha = 0.15 + clipPct * 0.15;
            ctx.font = `bold ${Math.min(w * 0.04, 32)}px Inter, sans-serif`;
            ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
            ctx.fillText(currentClip.title, w/2, h/2 - 8);
            ctx.font = `${Math.min(w * 0.02, 14)}px Inter, sans-serif`;
            ctx.fillStyle = currentClip.color;
            ctx.globalAlpha = 0.3;
            ctx.fillText(`片段 ${currentClip.id} · ${currentClip.duration}s`, w/2, h/2 + 24);
            ctx.globalAlpha = 1;
            ctx.restore();
        }

        function updatePlayerUI() {
            const pct = (playTime / totalDuration) * 100;
            document.getElementById('ctrlFill').style.width = pct + '%';
            document.getElementById('ctrlHandle').style.left = pct + '%';
            const m = Math.floor(playTime / 60);
            const s = Math.floor(playTime % 60);
            document.getElementById('ctrlTime').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            let elapsed = 0;
            document.querySelectorAll('.gen-tl-seg').forEach((seg, i) => {
                const clip = clips[i];
                if (!clip) return;
                seg.classList.toggle('active', playTime >= elapsed && playTime < elapsed + clip.duration);
                elapsed += clip.duration;
            });
        }

        function renderTimelineOverlay() {
            const el = document.getElementById('timelineOverlay');
            if (!el) return;
            el.innerHTML = clips.map(c => {
                const pct = (c.duration / totalDuration) * 100;
                return `<div class="gen-tl-seg" style="width:${pct}%;background:${c.color}12;border-color:${c.color}30;color:${c.color};">${c.title}</div>`;
            }).join('');
        }

        // ===== Player controls =====
        document.getElementById('ctrlPlay').addEventListener('click', () => {
            playing = !playing;
            document.getElementById('ctrlPlay').classList.toggle('playing', playing);
        });
        document.getElementById('ctrlProgress').addEventListener('click', e => {
            const rect = e.currentTarget.getBoundingClientRect();
            playTime = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width)) * totalDuration;
        });

        // ===== Phase management =====
        function setLeftPhase(id) {
            document.querySelectorAll('.gen-left-phase').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function updatePipeline() {
            const bar = document.getElementById('pipelineBar');
            const steps = document.getElementById('pipeSteps');
            bar.classList.add('active');

            const pipeData = [
                { label: '分镜', phase: 'storyboard' },
                { label: '生成', phase: 'synth' },
                { label: '播放', phase: 'player' }
            ];
            const phaseOrder = ['storyboard', 'synth', 'player'];
            const currentIdx = phaseOrder.indexOf(phase);

            steps.innerHTML = pipeData.map((s, i) => {
                let cls = 'gen-pipe-step';
                if (i === currentIdx) cls += ' active';
                else if (i < currentIdx) cls += ' completed';
                return `<div class="${cls}"><span class="gen-pipe-dot"></span>${s.label}</div>`;
            }).join('');
        }

        // ===== Chat input =====
        function handleChatSend() {
            const text = chatInput.value.trim();
            if (!text) return;
            chatInput.value = '';
            addBubble('user', `<p>${text}</p>`);

            // Simulate AI response
            setTimeout(() => {
                const responses = [
                    '好的，我来调整一下。已更新片段描述，左侧分镜已同步刷新。',
                    '收到！我理解你的意思，画面风格已按你的要求微调。',
                    '没问题，我帮你优化了这段的镜头运动。你可以在左侧查看更新后的预览。',
                    '已收到修改意见，让我重新编排一下这个片段的画面节奏。'
                ];
                addBubble('ai', `<p>${responses[Math.floor(Math.random() * responses.length)]}</p>`);
            }, 800);
        }

        chatInput.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleChatSend();
            }
        });
        document.getElementById('chatSend').addEventListener('click', handleChatSend);

        // ===== Export =====
        document.getElementById('exportBtn').addEventListener('click', () => {
            addBubble('ai', '<p>📥 视频导出中... 格式 MP4 (H.264)、分辨率 1080p。完成后将自动下载。</p>');
        });

    })();
    </script>
</body>
