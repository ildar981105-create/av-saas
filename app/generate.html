<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 生成视频 — FrameX</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
    /* ==============================================
       AI 生成 — 沉浸式全屏体验
       ============================================== */
    .aig-body {
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
    }

    /* ===== Top Bar ===== */
    .aig-topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 48px;
        padding: 0 16px;
        background: rgba(10,10,16,0.92);
        backdrop-filter: blur(16px);
        border-bottom: 1px solid rgba(255,255,255,0.05);
        flex-shrink: 0;
        z-index: 100;
    }
    .aig-topbar-left {
        display: flex;
        align-items: center;
        gap: 12px;
    }
    .aig-back {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.78rem;
        font-weight: 500;
        color: #64748b;
        transition: color 0.2s;
        text-decoration: none;
    }
    .aig-back:hover { color: #e2e8f0; }
    .aig-topbar-title {
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
    }
    .aig-topbar-title .subtitle {
        font-weight: 400;
        color: #475569;
        font-size: 0.72rem;
        margin-left: 8px;
    }
    .aig-topbar-right {
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .aig-credits {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 4px 12px;
        font-size: 0.72rem;
        font-weight: 500;
        color: #a78bfa;
        background: rgba(168,85,247,0.1);
        border: 1px solid rgba(168,85,247,0.2);
        border-radius: 100px;
    }
    .aig-topbar-btn {
        width: 32px; height: 32px;
        border-radius: 8px;
        border: 1px solid rgba(255,255,255,0.06);
        background: rgba(255,255,255,0.03);
        color: #64748b;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s;
    }
    .aig-topbar-btn:hover { color: #e2e8f0; background: rgba(255,255,255,0.06); }

    /* ===== Main Split ===== */
    .aig-main {
        flex: 1;
        display: flex;
        min-height: 0;
        overflow: hidden;
    }

    /* ===== Left: Canvas Area ===== */
    .aig-canvas-area {
        flex: 1;
        position: relative;
        overflow: hidden;
        min-width: 0;
        background: #06060a;
    }

    /* Phase overlays */
    .aig-phase {
        position: absolute;
        inset: 0;
        display: none;
        z-index: 1;
    }
    .aig-phase.active { display: flex; }

    /* Phase 0: Welcome / Input */
    .aig-welcome {
        align-items: center;
        justify-content: center;
        background: radial-gradient(ellipse at center, rgba(168,85,247,0.04) 0%, transparent 70%);
    }
    .aig-welcome-inner {
        text-align: center;
        max-width: 480px;
        position: relative;
        z-index: 2;
    }
    .aig-welcome-glow {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 600px; height: 600px;
        background: radial-gradient(circle,
            rgba(168,85,247,0.06) 0%,
            rgba(99,102,241,0.03) 30%,
            rgba(6,182,212,0.02) 50%,
            transparent 70%);
        border-radius: 50%;
        pointer-events: none;
        animation: aigGlowPulse 6s ease-in-out infinite;
    }
    @keyframes aigGlowPulse {
        0%, 100% { transform: translate(-50%,-50%) scale(1); opacity: 0.7; }
        50% { transform: translate(-50%,-50%) scale(1.2); opacity: 1; }
    }
    .aig-welcome-orb {
        position: relative;
        width: 80px; height: 80px;
        margin: 0 auto 28px;
    }
    .aig-welcome-orb-core {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%,-50%);
        width: 56px; height: 56px;
        border-radius: 50%;
        background: linear-gradient(135deg, #a855f7, #6366f1, #06b6d4);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 40px rgba(168,85,247,0.4), 0 0 80px rgba(99,102,241,0.15);
    }
    .aig-welcome-orb-ring {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%,-50%);
        width: 80px; height: 80px;
        border-radius: 50%;
        border: 2px solid rgba(168,85,247,0.15);
        animation: aigOrbPulse 3s ease-in-out infinite;
    }
    @keyframes aigOrbPulse {
        0%, 100% { transform: translate(-50%,-50%) scale(1); opacity: 0.5; }
        50% { transform: translate(-50%,-50%) scale(1.4); opacity: 0; }
    }
    .aig-welcome h1 {
        font-size: 1.8rem;
        font-weight: 800;
        margin-bottom: 10px;
        line-height: 1.3;
    }
    .aig-welcome-desc {
        font-size: 0.88rem;
        color: #64748b;
        margin-bottom: 36px;
        line-height: 1.6;
    }
    /* Inspiration chips */
    .aig-inspo-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
        margin-bottom: 20px;
    }
    .aig-inspo-chip {
        padding: 8px 18px;
        font-size: 0.78rem;
        font-weight: 500;
        color: #94a3b8;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 100px;
        cursor: pointer;
        transition: all 0.25s;
        display: flex;
        align-items: center;
        gap: 6px;
    }
    .aig-inspo-chip:hover {
        color: #e2e8f0;
        border-color: rgba(168,85,247,0.35);
        background: rgba(168,85,247,0.06);
        transform: translateY(-2px);
    }
    .aig-inspo-chip.active {
        color: #a78bfa;
        background: rgba(168,85,247,0.1);
        border-color: rgba(168,85,247,0.4);
    }
    .aig-inspo-emoji { font-size: 1rem; }

    /* Capabilities */
    .aig-caps {
        display: flex;
        gap: 20px;
        justify-content: center;
        margin-top: 24px;
    }
    .aig-cap {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 0.72rem;
        color: #475569;
    }
    .aig-cap-dot {
        width: 4px; height: 4px;
        border-radius: 50%;
        background: rgba(168,85,247,0.4);
    }

    /* Phase 1: Storyboard Preview */
    .aig-storyboard {
        flex-direction: column;
        background: #06060a;
    }
    .aig-sb-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 16px 20px;
        flex-shrink: 0;
    }
    .aig-sb-badge {
        padding: 4px 12px;
        font-size: 0.72rem;
        font-weight: 600;
        color: #a78bfa;
        background: rgba(168,85,247,0.1);
        border: 1px solid rgba(168,85,247,0.2);
        border-radius: 100px;
    }
    .aig-sb-info {
        font-size: 0.78rem;
        color: #64748b;
    }
    .aig-sb-grid {
        flex: 1;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        padding: 0 20px 20px;
        overflow-y: auto;
        min-height: 0;
    }
    .aig-sb-grid::-webkit-scrollbar { width: 4px; }
    .aig-sb-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }
    .aig-sb-card {
        position: relative;
        aspect-ratio: 16/10;
        border-radius: 14px;
        overflow: hidden;
        border: 1px solid rgba(255,255,255,0.06);
        background: linear-gradient(135deg, rgba(15,15,30,0.8), rgba(10,10,20,0.9));
        cursor: pointer;
        transition: all 0.35s;
    }
    .aig-sb-card:hover {
        border-color: rgba(168,85,247,0.3);
        transform: scale(1.02);
        box-shadow: 0 8px 30px rgba(168,85,247,0.1);
    }
    .aig-sb-card canvas {
        width: 100%; height: 100%;
        display: block;
    }
    .aig-sb-card-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(transparent 50%, rgba(0,0,0,0.7));
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 14px;
    }
    .aig-sb-card-num {
        position: absolute;
        top: 10px; left: 10px;
        width: 24px; height: 24px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.7rem;
        font-weight: 700;
        color: #fff;
        background: rgba(168,85,247,0.6);
        backdrop-filter: blur(8px);
    }
    .aig-sb-card-duration {
        position: absolute;
        top: 10px; right: 10px;
        padding: 2px 8px;
        font-size: 0.65rem;
        font-weight: 500;
        color: #fff;
        background: rgba(0,0,0,0.55);
        border-radius: 6px;
        font-family: 'JetBrains Mono', monospace;
    }
    .aig-sb-card-title {
        font-size: 0.82rem;
        font-weight: 600;
        color: #fff;
        margin-bottom: 2px;
    }
    .aig-sb-card-desc {
        font-size: 0.68rem;
        color: rgba(255,255,255,0.6);
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        line-height: 1.4;
    }

    /* Phase 2: Synthesizing */
    .aig-synth {
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #06060a 0%, #0a0a1a 50%, #06060a 100%);
    }
    .aig-synth-inner {
        text-align: center;
        max-width: 400px;
    }
    .aig-synth-orb {
        position: relative;
        width: 100px; height: 100px;
        margin: 0 auto 28px;
    }
    .aig-synth-orb .ring {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        border: 2px solid transparent;
    }
    .aig-synth-orb .ring:nth-child(1) { width:100px;height:100px; border-top-color:#a855f7; animation: spin 1.5s linear infinite; }
    .aig-synth-orb .ring:nth-child(2) { width:76px;height:76px; border-right-color:#6366f1; animation: spin 2s linear infinite reverse; }
    .aig-synth-orb .ring:nth-child(3) { width:52px;height:52px; border-bottom-color:#06b6d4; animation: spin 1s linear infinite; }
    .aig-synth-orb .core {
        position: absolute; top:50%;left:50%; transform:translate(-50%,-50%);
        width:20px;height:20px; border-radius:50%;
        background: linear-gradient(135deg, #a855f7, #06b6d4);
        box-shadow: 0 0 30px rgba(168,85,247,0.5);
    }
    .aig-synth-text {
        font-size: 1rem;
        font-weight: 600;
        color: #e2e8f0;
        margin-bottom: 8px;
    }
    .aig-synth-sub {
        font-size: 0.82rem;
        color: #64748b;
        margin-bottom: 24px;
    }
    .aig-synth-progress {
        width: 240px;
        height: 4px;
        background: rgba(255,255,255,0.06);
        border-radius: 2px;
        overflow: hidden;
        margin: 0 auto 12px;
    }
    .aig-synth-progress-bar {
        height: 100%;
        background: linear-gradient(90deg, #a855f7, #6366f1, #06b6d4);
        border-radius: 2px;
        width: 0%;
        transition: width 0.6s ease;
    }
    .aig-synth-clip-info {
        font-size: 0.78rem;
        color: #64748b;
        font-family: 'JetBrains Mono', monospace;
    }
    /* Synth clip cards */
    .aig-synth-clips {
        display: flex;
        gap: 8px;
        justify-content: center;
        margin-top: 20px;
    }
    .aig-synth-clip-dot {
        width: 36px; height: 36px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.72rem;
        font-weight: 700;
        color: #475569;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.06);
        transition: all 0.3s;
    }
    .aig-synth-clip-dot.active {
        color: #a78bfa;
        background: rgba(168,85,247,0.12);
        border-color: rgba(168,85,247,0.3);
        box-shadow: 0 0 16px rgba(168,85,247,0.15);
    }
    .aig-synth-clip-dot.completed {
        color: #22c55e;
        background: rgba(34,197,94,0.1);
        border-color: rgba(34,197,94,0.25);
    }

    /* Phase 3: Player */
    .aig-player {
        background: #06060a;
    }
    .aig-player canvas {
        width: 100%; height: 100%;
        display: block;
    }
    .aig-player-controls {
        position: absolute;
        bottom: 0; left: 0; right: 0;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 20px;
        background: linear-gradient(transparent, rgba(0,0,0,0.75));
        z-index: 5;
    }
    .aig-timeline-overlay {
        position: absolute;
        bottom: 56px; left: 16px; right: 16px;
        display: flex;
        gap: 3px;
        height: 28px;
        z-index: 4;
    }
    .aig-tl-seg {
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 6px;
        font-size: 0.62rem;
        font-weight: 600;
        border: 1px solid;
        transition: all 0.3s;
        cursor: default;
    }
    .aig-tl-seg.active {
        box-shadow: 0 0 12px rgba(168,85,247,0.2);
        transform: scaleY(1.1);
    }

    /* ===== Right Sidebar ===== */
    .aig-sidebar {
        width: 360px;
        flex-shrink: 0;
        background: rgba(12,12,20,0.95);
        backdrop-filter: blur(20px);
        border-left: 1px solid rgba(255,255,255,0.06);
        display: flex;
        flex-direction: column;
        z-index: 50;
        overflow: hidden;
        transition: width 0.35s cubic-bezier(.4,0,.2,1), opacity 0.25s;
    }
    .aig-sidebar.collapsed {
        width: 0; min-width: 0; border-left-color: transparent; opacity: 0; pointer-events: none;
    }

    /* Sidebar header */
    .aig-sb-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px;
        flex-shrink: 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .aig-sb-step-label {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
    }

    /* Sidebar body */
    .aig-sb-body {
        flex: 1;
        padding: 16px;
        overflow-y: auto;
        min-height: 0;
    }
    .aig-sb-body::-webkit-scrollbar { width: 4px; }
    .aig-sb-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }

    /* Sidebar panels */
    .aig-panel { display: none; }
    .aig-panel.active { display: block; animation: aigPanelIn 0.35s ease-out; }
    @keyframes aigPanelIn {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Story panel */
    .aig-story-label {
        font-size: 0.72rem;
        font-weight: 600;
        color: #475569;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 10px;
    }
    .aig-story-textarea {
        width: 100%;
        min-height: 140px;
        padding: 14px 16px;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.07);
        border-radius: 14px;
        color: #e2e8f0;
        font-size: 0.85rem;
        font-family: inherit;
        outline: none;
        resize: vertical;
        line-height: 1.7;
        transition: border-color 0.3s;
        margin-bottom: 10px;
    }
    .aig-story-textarea::placeholder { color: #475569; }
    .aig-story-textarea:focus { border-color: rgba(168,85,247,0.35); }
    .aig-story-tools {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
    }
    .aig-char-count {
        font-size: 0.7rem;
        color: #475569;
        font-family: 'JetBrains Mono', monospace;
    }
    .aig-ai-btns {
        display: flex;
        gap: 6px;
    }
    .aig-ai-btn {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 5px 12px;
        font-size: 0.72rem;
        font-weight: 500;
        color: #a78bfa;
        background: rgba(168,85,247,0.08);
        border: 1px solid rgba(168,85,247,0.2);
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
    }
    .aig-ai-btn:hover { background: rgba(168,85,247,0.15); border-color: rgba(168,85,247,0.4); }
    .aig-ai-btn.loading { opacity: 0.5; pointer-events: none; }

    /* Config section in sidebar */
    .aig-config-section {
        margin-bottom: 16px;
    }
    .aig-config-title {
        font-size: 0.72rem;
        font-weight: 600;
        color: #475569;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 10px;
    }
    .aig-config-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
    }
    .aig-config-grid .config-field { min-width: 0; }
    .aig-config-full {
        grid-column: span 2;
    }

    /* Sidebar footer actions */
    .aig-sb-foot {
        padding: 12px 16px;
        border-top: 1px solid rgba(255,255,255,0.05);
        flex-shrink: 0;
    }
    .aig-next-btn {
        width: 100%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 11px 24px;
        font-size: 0.88rem;
        font-weight: 700;
        color: #fff;
        background: linear-gradient(135deg, #a855f7, #6366f1, #3b82f6, #06b6d4);
        background-size: 200% 200%;
        animation: immGradShift 4s ease infinite;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        box-shadow: 0 0 30px rgba(168,85,247,0.25);
        transition: all 0.3s;
        font-family: inherit;
        position: relative;
        overflow: hidden;
    }
    .aig-next-btn:hover { transform: translateY(-1px); box-shadow: 0 0 50px rgba(168,85,247,0.35); }
    .aig-next-btn::before {
        content: '';
        position: absolute;
        top: -50%; left: -50%;
        width: 200%; height: 200%;
        background: conic-gradient(from 0deg, transparent, rgba(255,255,255,0.1), transparent 30%);
        animation: shimmer 3s linear infinite;
    }
    .aig-next-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none !important;
        box-shadow: none !important;
    }
    .aig-secondary-btn {
        width: 100%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 10px 20px;
        font-size: 0.82rem;
        font-weight: 500;
        color: #94a3b8;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
        margin-top: 8px;
    }
    .aig-secondary-btn:hover { color: #e2e8f0; border-color: rgba(168,85,247,0.3); }

    /* Clips editor panel */
    .aig-clip-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    .aig-clip-item {
        padding: 12px 14px;
        background: rgba(255,255,255,0.025);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 12px;
        transition: all 0.25s;
        cursor: pointer;
    }
    .aig-clip-item:hover { border-color: rgba(168,85,247,0.2); }
    .aig-clip-item.active {
        border-color: rgba(168,85,247,0.35);
        background: rgba(168,85,247,0.04);
    }
    .aig-clip-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
    }
    .aig-clip-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 3px 10px;
        border-radius: 6px;
        font-size: 0.72rem;
        font-weight: 600;
    }
    .aig-clip-dur {
        font-size: 0.68rem;
        color: #64748b;
        font-family: 'JetBrains Mono', monospace;
    }
    .aig-clip-textarea {
        width: 100%;
        min-height: 48px;
        padding: 8px 10px;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 10px;
        color: #e2e8f0;
        font-size: 0.78rem;
        font-family: inherit;
        outline: none;
        resize: vertical;
        line-height: 1.5;
        transition: border-color 0.2s;
    }
    .aig-clip-textarea:focus { border-color: rgba(168,85,247,0.3); }
    .aig-clip-textarea::placeholder { color: #475569; }

    /* Done panel */
    .aig-done-actions {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 16px;
    }
    .aig-done-download {
        display: inline-flex;
        align-items: center;
        justify-content: center;

        let animFrame = null;

        // ===== DOM =====
        const storyInput = document.getElementById('storyInput');
        const charCount = document.getElementById('charCount');
        const mainBtn = document.getElementById('mainActionBtn');
        const sbStepLabel = document.getElementById('sbStepLabel');
        const topbarSub = document.getElementById('topbarSubtitle');

        // ===== Char count =====
        storyInput.addEventListener('input', () => {
            charCount.textContent = storyInput.value.length;
        });

        // ===== Template chips =====
        document.querySelectorAll('.aig-inspo-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                const tpl = chip.getAttribute('data-tpl');
                if (templates[tpl]) {
                    storyInput.value = templates[tpl];
                    charCount.textContent = storyInput.value.length;
                    storyInput.focus();
                    document.querySelectorAll('.aig-inspo-chip').forEach(c => c.classList.remove('active'));
                    chip.classList.add('active');
                }
            });
        });

        // ===== Style cards =====
        document.querySelectorAll('.aig-style-card').forEach(card => {
            card.addEventListener('click', () => {
                document.querySelectorAll('.aig-style-card').forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                selectedStyle = card.dataset.style;
            });
        });

        // ===== Ratio chips =====
        document.querySelectorAll('.aig-ratio-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll('.aig-ratio-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                selectedRatio = chip.dataset.ratio;
            });
        });

        // ===== AI buttons =====
        document.getElementById('aiExpandBtn').addEventListener('click', () => {
            if (!storyInput.value.trim()) return;
            const btn = document.getElementById('aiExpandBtn');
            btn.classList.add('loading');
            btn.textContent = '扩写中...';
            setTimeout(() => {
                storyInput.value += '\n\n镜头继续推进，画面中出现了更多细节——光线在空间中流转，每一帧都充满了电影般的质感。背景音乐渐渐响起，将整个氛围推向高潮。最终画面定格在最动人的瞬间，余韵悠长。';
                charCount.textContent = storyInput.value.length;
                btn.classList.remove('loading');
                btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1L7.2 4H10.5L7.8 6L9 9.2L6 7L3 9.2L4.2 6L1.5 4H4.8L6 1Z" stroke="currentColor" stroke-width="1" stroke-linejoin="round"/></svg> 扩写';
            }, 1500);
        });

        document.getElementById('aiOptimizeBtn').addEventListener('click', () => {
            if (!storyInput.value.trim()) return;
            const btn = document.getElementById('aiOptimizeBtn');
            btn.classList.add('loading');
            btn.textContent = '优化中...';
            setTimeout(() => {
                storyInput.value = '【已优化】' + storyInput.value.replace('【已优化】', '');
                charCount.textContent = storyInput.value.length;
                btn.classList.remove('loading');
                btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 9L5 6L7 8L10 3" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/></svg> 优化';
            }, 1200);
        });

        // ===== Phase management =====
        function setPhase(phase) {
            currentPhase = phase;
            document.querySelectorAll('.aig-phase').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.aig-panel').forEach(p => p.classList.remove('active'));

            const foot = document.getElementById('sbFoot');

            if (phase === 0) {
                document.getElementById('phaseWelcome').classList.add('active');
                document.getElementById('panelStory').classList.add('active');
                sbStepLabel.textContent = '创意 & 设置';
                topbarSub.textContent = '创意输入';
                mainBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2L10 6.5H14.5L11 9L12.5 13.5L8 10.5L3.5 13.5L5 9L1.5 6.5H6L8 2Z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round" fill="currentColor" opacity="0.2"/></svg> 解析故事为片段';
                foot.style.display = '';
            } else if (phase === 1) {
                document.getElementById('phaseStoryboard').classList.add('active');
                document.getElementById('panelClips').classList.add('active');
                sbStepLabel.textContent = '片段编辑';
                topbarSub.textContent = '故事板';
                mainBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M5 2L13 8L5 14V2Z" fill="currentColor"/></svg> 开始生成视频';
                foot.style.display = '';
            } else if (phase === 2) {
                document.getElementById('phaseSynth').classList.add('active');
                document.getElementById('panelSynth').classList.add('active');
                sbStepLabel.textContent = '生成进度';
                topbarSub.textContent = '生成中...';
                foot.style.display = 'none';
            } else if (phase === 3) {
                document.getElementById('phasePlayer').classList.add('active');
                document.getElementById('panelDone').classList.add('active');
                sbStepLabel.textContent = '完成';
                topbarSub.textContent = '生成完成';
                foot.style.display = 'none';
            }
        }

        // ===== Parse story =====
        function parseStory() {
            const text = storyInput.value.trim();
            if (!text) {
                storyInput.focus();
                storyInput.style.borderColor = 'rgba(239,68,68,0.5)';
                setTimeout(() => storyInput.style.borderColor = '', 1500);
                return;
            }

            const sentences = text.replace(/([。！？.!?])/g, '$1||').split('||').filter(s => s.trim());
            const chunkSize = Math.ceil(sentences.length / 4);
            clips = [];

            for (let i = 0; i < 4; i++) {
                const start = i * chunkSize;
                const chunk = sentences.slice(start, start + chunkSize).join('');
                clips.push({
                    id: i + 1,
                    title: clipLabels[i],
                    duration: clipDurations[i],
                    desc: chunk.trim() || '（AI 将自动生成画面描述）',
                    color: clipColors[i]
                });
            }

            totalDuration = clips.reduce((s, c) => s + c.duration, 0);
            renderStoryboard();
            renderClipList();
            setPhase(1);
        }

        // ===== Render storyboard (left canvas) =====
        function renderStoryboard() {
            const grid = document.getElementById('sbGrid');
            grid.innerHTML = '';
            document.getElementById('sbClipInfo').textContent = `${clips.length} 个片段 · 总时长 ${totalDuration}s`;

            clips.forEach((clip, i) => {
                const card = document.createElement('div');
                card.className = 'aig-sb-card';
                card.innerHTML = `
                    <canvas width="400" height="250"></canvas>
                    <div class="aig-sb-card-overlay">
                        <span class="aig-sb-card-num">${clip.id}</span>
                        <span class="aig-sb-card-duration">${clip.duration}s</span>
                        <div class="aig-sb-card-title">${clip.title}</div>
                        <div class="aig-sb-card-desc">${clip.desc}</div>
                    </div>
                `;
                grid.appendChild(card);

                // Draw canvas
                const canvas = card.querySelector('canvas');
                drawClipPreview(canvas, clip, i);
            });
        }

        function drawClipPreview(canvas, clip, idx) {
            const ctx = canvas.getContext('2d');
            const w = canvas.width, h = canvas.height;
            const hue1 = (idx * 85 + 180) % 360;
            const hue2 = (hue1 + 50) % 360;
            const grd = ctx.createLinearGradient(0, 0, w, h);
            grd.addColorStop(0, `hsl(${hue1}, 35%, 12%)`);
            grd.addColorStop(0.5, `hsl(${hue2}, 30%, 16%)`);
            grd.addColorStop(1, `hsl(${(hue1+120)%360}, 25%, 10%)`);
            ctx.fillStyle = grd;
            ctx.fillRect(0, 0, w, h);

            // Decorative elements
            ctx.globalAlpha = 0.15;
            for (let j = 0; j < 6; j++) {
                const x = (Math.sin(idx * 3 + j * 1.5) * 0.3 + 0.5) * w;
                const y = (Math.cos(idx * 2 + j * 2.3) * 0.3 + 0.5) * h;
                const r = 30 + j * 15;
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.fillStyle = clip.color;
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }

        // ===== Render clip list (sidebar) =====
        function renderClipList() {
            const list = document.getElementById('clipList');
            list.innerHTML = '';
            clips.forEach((clip, i) => {
                const item = document.createElement('div');
                item.className = 'aig-clip-item' + (i === 0 ? ' active' : '');
                item.innerHTML = `
                    <div class="aig-clip-top">
                        <span class="aig-clip-badge" style="background:${clip.color}15;color:${clip.color};border:1px solid ${clip.color}30;">片段 ${clip.id} · ${clip.title}</span>
                        <span class="aig-clip-dur">${clip.duration}s</span>
                    </div>
                    <textarea class="aig-clip-textarea" data-idx="${i}" placeholder="描述画面...">${clip.desc}</textarea>
                `;
                list.appendChild(item);

                item.querySelector('.aig-clip-textarea').addEventListener('input', e => {
                    clips[i].desc = e.target.value;
                });
                item.addEventListener('click', e => {
                    if (e.target.tagName === 'TEXTAREA') return;
                    document.querySelectorAll('.aig-clip-item').forEach(c => c.classList.remove('active'));
                    item.classList.add('active');
                });
            });
        }

        // ===== Start synthesis =====
        function startSynth() {
            setPhase(2);

            // Generate synth clip dots
            const dotsEl = document.getElementById('synthClips');
            dotsEl.innerHTML = clips.map((c, i) =>
                `<div class="aig-synth-clip-dot" data-idx="${i}">${c.id}</div>`
            ).join('');

            // Generate sidebar step list
            const stepList = document.getElementById('synthStepList');
            stepList.innerHTML = clips.map((c, i) => `
                <div class="pipe-step" data-idx="${i}">
                    <span class="pipe-step-dot"></span>
                    片段 ${c.id}: ${c.title}
                </div>
            `).join('');

            let clipIdx = 0;
            const bar = document.getElementById('synthBar');
            const textEl = document.getElementById('synthText');
            const subEl = document.getElementById('synthSub');
            const infoEl = document.getElementById('synthClipInfo');

            function processClip() {
                if (clipIdx >= clips.length) {
                    textEl.textContent = '合成完成！';
                    subEl.textContent = '正在准备播放器...';
                    bar.style.width = '100%';
                    infoEl.textContent = `${clips.length} / ${clips.length}`;

                    document.querySelectorAll('.aig-synth-clip-dot').forEach(d => d.classList.add('completed'));
                    document.querySelectorAll('#synthStepList .pipe-step').forEach(s => { s.classList.remove('active'); s.classList.add('completed'); });

                    setTimeout(() => {
                        setPhase(3);
                        document.getElementById('doneTotal').textContent = totalDuration + 's';
                        document.getElementById('doneClips').textContent = clips.length;
                        initPlayer();
                    }, 800);
                    return;
                }

                const clip = clips[clipIdx];
                textEl.textContent = `正在生成片段 ${clip.id}：${clip.title}`;
                subEl.textContent = clip.desc.substring(0, 40) + '...';
                infoEl.textContent = `${clipIdx + 1} / ${clips.length}`;

                const dots = document.querySelectorAll('.aig-synth-clip-dot');
                dots.forEach(d => d.classList.remove('active'));
                if (clipIdx > 0) dots[clipIdx - 1].classList.add('completed');
                dots[clipIdx].classList.add('active');

                const steps = document.querySelectorAll('#synthStepList .pipe-step');
                steps.forEach(s => s.classList.remove('active'));
                if (clipIdx > 0) steps[clipIdx - 1].classList.add('completed');
                steps[clipIdx].classList.add('active');

                const pct = ((clipIdx + 1) / clips.length) * 100;
                bar.style.width = (pct - 100/clips.length) + '%';

                const genTime = 1500 + Math.random() * 1500;
                setTimeout(() => {
                    bar.style.width = pct + '%';
                    clipIdx++;
                    setTimeout(processClip, 300);
                }, genTime);
            }
            processClip();
        }

        // ===== Player =====
        function initPlayer() {
            const canvas = document.getElementById('playerCanvas');
            const rect = canvas.parentElement.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;

            const durEl = document.getElementById('ctrlDur');
            const m = Math.floor(totalDuration / 60);
            const s = totalDuration % 60;
            durEl.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

            playTime = 0;
            playing = true;
            document.getElementById('ctrlPlay').classList.add('playing');
            renderTimelineOverlay();

            function tick() {
                if (playing) {
                    playTime += 1/60;
                    if (playTime >= totalDuration) playTime = 0;
                }
                drawPlayerFrame(playTime);
                updatePlayerUI();
                animFrame = requestAnimationFrame(tick);
            }
            tick();
        }

        function drawPlayerFrame(t) {
            const canvas = document.getElementById('playerCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            const w = canvas.width / dpr;
            const h = canvas.height / dpr;
            ctx.save();
            ctx.scale(dpr, dpr);
            ctx.clearRect(0, 0, w, h);

            let elapsed = 0;
            let currentClip = clips[0];
            for (const c of clips) {
                if (t < elapsed + c.duration) { currentClip = c; break; }
                elapsed += c.duration;
            }
            const clipT = t - elapsed;
            const clipPct = clipT / currentClip.duration;

            // Gradient bg
            const idx = clips.indexOf(currentClip);
            const hue1 = (idx * 85 + 180 + t * 3) % 360;
            const hue2 = (hue1 + 50) % 360;
            const grd = ctx.createLinearGradient(0, 0, w, h);
            grd.addColorStop(0, `hsl(${hue1}, 40%, 12%)`);
            grd.addColorStop(0.5, `hsl(${hue2}, 35%, 16%)`);
            grd.addColorStop(1, `hsl(${(hue1+120)%360}, 30%, 10%)`);
            ctx.fillStyle = grd;
            ctx.fillRect(0, 0, w, h);

            // Particles
            ctx.globalAlpha = 0.25;
            for (let i = 0; i < 12; i++) {
                const px = (Math.sin(t * 0.2 + i * 2.1) * 0.4 + 0.5) * w;
                const py = (Math.cos(t * 0.15 + i * 1.8) * 0.4 + 0.5) * h;
                const r = 2 + Math.sin(t * 0.5 + i) * 1.5;
                ctx.beginPath();
                ctx.arc(px, py, r, 0, Math.PI * 2);
                ctx.fillStyle = currentClip.color;
                ctx.fill();
            }

            // Large soft circle
            ctx.globalAlpha = 0.06;
            ctx.beginPath();
            ctx.arc(w/2 + Math.sin(t*0.3)*60, h/2 + Math.cos(t*0.2)*40, 150 + Math.sin(t*0.4)*30, 0, Math.PI*2);
            ctx.fillStyle = currentClip.color;
            ctx.fill();

            // Title
            ctx.globalAlpha = 0.15 + clipPct * 0.15;
            ctx.font = `bold ${Math.min(w * 0.04, 32)}px Inter, sans-serif`;
            ctx.fillStyle = '#fff';
            ctx.textAlign = 'center';
            ctx.fillText(currentClip.title, w/2, h/2 - 8);
            ctx.font = `${Math.min(w * 0.02, 14)}px Inter, sans-serif`;
            ctx.fillStyle = currentClip.color;
            ctx.globalAlpha = 0.3;
            ctx.fillText(`片段 ${currentClip.id} · ${currentClip.duration}s`, w/2, h/2 + 24);

            ctx.globalAlpha = 1;
            ctx.restore();
        }

        function updatePlayerUI() {
            const pct = (playTime / totalDuration) * 100;
            const fill = document.getElementById('ctrlFill');
            const handle = document.getElementById('ctrlHandle');
            const timeEl = document.getElementById('ctrlTime');
            if (fill) fill.style.width = pct + '%';
            if (handle) handle.style.left = pct + '%';
            if (timeEl) {
                const m = Math.floor(playTime / 60);
                const s = Math.floor(playTime % 60);
                timeEl.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            }
            // Highlight timeline segments
            let elapsed = 0;
            document.querySelectorAll('.aig-tl-seg').forEach((seg, i) => {
                const clip = clips[i];
                if (!clip) return;
                seg.classList.toggle('active', playTime >= elapsed && playTime < elapsed + clip.duration);
                elapsed += clip.duration;
            });
        }

        function renderTimelineOverlay() {
            const el = document.getElementById('timelineOverlay');
            if (!el) return;
            el.innerHTML = clips.map((c, i) => {
                const pct = (c.duration / totalDuration) * 100;
                return `<div class="aig-tl-seg" style="width:${pct}%;background:${c.color}12;border-color:${c.color}30;color:${c.color};" title="${c.title} (${c.duration}s)">${c.title}</div>`;
            }).join('');
        }

        // ===== Main action button =====
        mainBtn.addEventListener('click', () => {
            if (currentPhase === 0) {
                parseStory();
            } else if (currentPhase === 1) {
                startSynth();
            }
        });

        // ===== Player controls =====
        document.getElementById('ctrlPlay').addEventListener('click', () => {
            playing = !playing;
            document.getElementById('ctrlPlay').classList.toggle('playing', playing);
        });

        document.getElementById('ctrlProgressBar').addEventListener('click', e => {
            const rect = e.currentTarget.getBoundingClientRect();
            const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
            playTime = pct * totalDuration;
        });

        // ===== Done panel buttons =====
        document.getElementById('exportBtn').addEventListener('click', () => {
            document.getElementById('exportPanel').classList.toggle('visible');
        });
        document.getElementById('closeExport').addEventListener('click', () => {
            document.getElementById('exportPanel').classList.remove('visible');
        });
        document.getElementById('regenBtn').addEventListener('click', () => {
            if (animFrame) cancelAnimationFrame(animFrame);
            startSynth();
        });
        document.getElementById('backToEditBtn').addEventListener('click', () => {
            if (animFrame) cancelAnimationFrame(animFrame);
            setPhase(1);
        });

        // ===== Sidebar toggle =====
        document.getElementById('toggleSidebar').addEventListener('click', () => {
            document.getElementById('aigSidebar').classList.toggle('collapsed');
        });

    })();
    </script>
</body>
